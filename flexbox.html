<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        * {
            background-color: #202838;
            margin: 0;
            padding: 0;
        }

        ul {
            margin-top: 100px;
            color: white;
            display: flex;
            background-color: rgb(77, 73, 177);
            position: sticky;
            top: 0px;
        }

        ul li {
            background-color: rgb(77, 73, 177);
            text-indent: 30px;
            list-style: none;
            padding-top: 15px;
            padding-bottom: 15px;
            /* list-style-position: inside; */
            /* list-style: disc inside url(""); for one line of code */
        }

        div {
            /* border: 1px solid rgb(234, 232, 232); */
            height: 1000px;
        }

        .container {
            border: 2px solid white;
            height: 200px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            /* align-items: center; */
            /* flex-direction: column; */
            flex-wrap: wrap;
            align-content: center;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            /* text-align: center; */
            margin: 10px;
            height: 50px;
            width: 50px;
            background-color: aliceblue;
            /* flex-grow: 1; */
        }
    </style>
</head>

<body>
    <div>

        <ul>
            <li>Home</li>
            <li>Contents</li>
            <li>About</li>
        </ul>
        <div class="container">
            <div class="item">3</div>
